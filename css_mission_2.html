<!DOCTYPE html>
<html lang='en'>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=divce-width, initial-scale=1.0">
        <title>미션2-정렬기능활용</title>
        <style>
            .container{
                display: flex;
                gap: 0px;
            }
            .box{
                display: flex;
                justify-content: center;
                align-items: center;

            }
            .box1{
                width:300px;
                height:100px;
                background-color: red;
            }
            .box2{
                width:700px;
                height: 100px;
                background-color:yellow;
            }
            
        </style>
    </head>
    <body>
        <div class="container">
            <div class="box box1"></div>
            <div class="box box2"></div>
        </div>
    </body>
    
</html>
